name: Feature request
description: Propose a new capability or an improvement to an existing one
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Feature requests are welcome**, especially when they come with
        a clear use case. For non-trivial proposals please open this
        issue first (before a PR) so the design can be reviewed.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish? What is the current workflow and why is it unsatisfying?
      placeholder: |
        When I run a skill that calls multiple tools in sequence, I want
        to…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Nio do? If you have a rough API or config sketch, paste it.
      placeholder: |
        Add a new `guard.batch_mode` option that groups findings across
        a session…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Where does this fit?
      multiple: true
      options:
        - Detection rules (scanner / Phase 2 / etc.)
        - Phase pipeline behaviour (orchestrator, short-circuits)
        - A specific platform adapter (Claude Code / OpenClaw / Hermes)
        - Telemetry / audit log / metrics
        - Configuration schema
        - CLI ergonomics (`action-cli`, `hook-cli`)
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
        - label: This is NOT a bug report (those use the bug template).
          required: true
