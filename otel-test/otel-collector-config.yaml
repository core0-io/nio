receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  otlp_grpc/signoz:
    endpoint: signoz-otel-collector:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp_grpc/signoz]
    metrics:
      receivers: [otlp]
      exporters: [debug, otlp_grpc/signoz]
    logs:
      receivers: [otlp]
      exporters: [debug, otlp_grpc/signoz]
