# Runtime guard pipeline settings (phases 0–6) + scan rules.
guard:
  # Protection level: strict | balanced | permissive
  #   strict      — block all risky actions (deny + confirm)
  #   balanced    — block dangerous, confirm on risky (default)
  #   permissive  — only block critical threats
  protection_level: balanced

  # Extra regex patterns for scan rules (Phase 3 static analysis + scan command).
  # Keys are rule module names; values are arrays of regex pattern strings.
  # All rules within the named module receive the extra patterns.
  #
  # Modules: shell_exec, remote_loader, secrets, obfuscation,
  #          prompt_injection, exfiltration, trojan
  #
  # Example:
  #   file_scan_rules:
  #     shell_exec:
  #       - "my_unsafe_exec\\("
  file_scan_rules:
    shell_exec: []        # SHELL_EXEC [high], AUTO_UPDATE [critical]
    remote_loader: []     # REMOTE_LOADER [critical]
    secrets: []           # READ_ENV_SECRETS [medium], READ_SSH_KEYS/READ_KEYCHAIN/PRIVATE_KEY_PATTERN [critical]
    obfuscation: []       # OBFUSCATION [high]
    prompt_injection: []  # PROMPT_INJECTION [critical]
    exfiltration: []      # NET_EXFIL_UNRESTRICTED [high], WEBHOOK_EXFIL [critical]
    trojan: []            # TROJAN_DISTRIBUTION [critical], SUSPICIOUS_PASTE_URL [high], SUSPICIOUS_IP/SOCIAL_ENGINEERING [medium]

  # Extra patterns for Phase 2 guard analysis (runtime action evaluation).
  # These extend the built-in detection lists for each category.
  #
  # Example:
  #   action_guard_rules:
  #     dangerous_commands: ["format c:"]
  #     webhook_domains: ["evil-webhook.example.com"]
  action_guard_rules:
    dangerous_commands: []   # Dangerous command strings, case-insensitive match   [critical]
    dangerous_patterns: []   # Dangerous command regexes                           [critical]
    sensitive_commands: []   # Sensitive data access commands                      [high]
    system_commands: []      # System modification commands                        [high]
    network_commands: []     # Network tool commands                               [medium]
    webhook_domains: []      # Webhook/exfiltration domains                        [high]
    sensitive_paths: []      # Sensitive file path fragments                       [critical]
    secret_patterns: []      # Secret detection regexes (request body scanning)   [varies]

  # LLM analyser settings (Phase 5 semantic analysis using Claude).
  # Requires api_key to be set. Disable with enabled: false.
  llm_analyser:
    # Enable/disable Phase 5 LLM analysis.
    enabled: false
    # Anthropic API key for LLM-based security analysis.
    api_key: ""
    # Model identifier for LLM analysis.
    model: "claude-sonnet-4-20250514"
    # Maximum input token budget sent to the LLM per scan.
    max_input_tokens: 50000

  # External scoring API (Phase 6). Requires endpoint to be set. Disable with enabled: false.
  external_analyser:
    # Enable/disable Phase 6 external scoring.
    enabled: false
    # Scoring API endpoint. Use http://localhost:9090 for the bundled mock scorer.
    endpoint: ""
    api_key: ""
    timeout: 3000

  # Phase 1 allowlist: additional command prefixes treated as safe.
  # Commands matching these prefixes bypass the guard pipeline.
  # Example: ["npm run", "pnpm "]
  allowed_commands: []

  # Phase 0 tool gate, per platform. Checked before any content analysis.
  # When non-empty, ONLY listed tools are available to the agent on that platform.
  available_tools:
    claude_code: []
    openclaw: []
  # Listed tools are unconditionally blocked on that platform.
  blocked_tools:
    claude_code: []
    openclaw: []

  # Tool → action type mapping, per platform.
  # Tools listed here enter Phase 1-6 deep analysis.
  # Others pass through Phase 0 only (if allowed) and are auto-approved.
  guarded_tools:
    claude_code:
      Bash: exec_command
      Write: write_file
      Edit: write_file
      WebFetch: network_request
      WebSearch: network_request
    openclaw:
      exec: exec_command
      write: write_file
      web_fetch: network_request
      browser: network_request

  # Phase scoring weights for weighted score aggregation.
  #   final_score = Σ(wi × si) / Σ(wi)  (only phases that ran)
  scoring_weights:
    runtime: 1.0       # Phase 2: pattern matching
    static: 1.0        # Phase 3: static rules on file content
    behavioural: 2.0   # Phase 4: AST dataflow analysis
    llm: 1.0           # Phase 5: LLM semantic analysis
    external: 2.0      # Phase 6: external scoring API

# Telemetry collection — shared OTLP connection + per-signal settings.
# Disabled when endpoint is empty and all local options are disabled.
collector:
  # OTLP collector base URL. /v1/traces, /v1/metrics, /v1/logs are appended automatically.
  endpoint: "http://localhost:4318"
  # Bearer token for OTLP endpoint authentication.
  api_key: ""
  # OTLP export timeout in milliseconds.
  timeout: 5000
  # OTLP transport protocol: http | grpc
  #   http — HTTP/JSON on port 4318
  #   grpc — gRPC on port 4317
  protocol: http

  # Metrics signal (counters, histograms).
  metrics:
    enabled: true
    local: true
    # Path to local JSONL file for metric payloads. Supports ~/ prefix.
    log: "~/.ffwd-agent-guard/metrics.jsonl"
    # Maximum local file size in MB before rotation (0 = no rotation).
    max_size_mb: 100

  # Traces signal (spans for tool calls, turns, tasks).
  traces:
    enabled: true

  # Logs signal (audit log entries: guard, scan, lifecycle events).
  logs:
    # Enable OTEL Logs export to collector endpoint.
    enabled: true
    # Enable local JSONL backup at the path below.
    local: true
    # Path to local JSONL audit log. Supports ~/ prefix.
    path: "~/.ffwd-agent-guard/audit.jsonl"
    # Maximum local file size in MB before rotation (0 = no rotation).
    max_size_mb: 100
