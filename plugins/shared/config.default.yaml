# Runtime guard pipeline settings (phases 0–6) + scan rules.
guard:
  # Protection level: strict | balanced | permissive
  #   strict      — block all risky actions (deny + confirm)
  #   balanced    — block dangerous, confirm on risky (default)
  #   permissive  — only block critical threats
  protection_level: balanced

  # Confirm fallback: what to do when the guard decision is "confirm"
  # but the platform has no interactive confirmation (e.g. OpenClaw).
  #   allow — let the action through, log a warning (default)
  #   deny  — block the action
  #   ask   — use platform confirm if available, else fall back to allow
  confirm_action: allow

  # Extra regex patterns for scan rules (Phase 3 static analysis + scan command).
  # Keys are rule module names; values are arrays of regex pattern strings.
  # All rules within the named module receive the extra patterns.
  #
  # Modules: shell_exec, remote_loader, secrets, obfuscation,
  #          prompt_injection, exfiltration, trojan
  #
  # Example:
  #   file_scan_rules:
  #     shell_exec:
  #       - "my_unsafe_exec\\("
  file_scan_rules:
    shell_exec: []        # SHELL_EXEC [high], AUTO_UPDATE [critical]
    remote_loader: []     # REMOTE_LOADER [critical]
    secrets: []           # READ_ENV_SECRETS [medium], READ_SSH_KEYS/READ_KEYCHAIN/PRIVATE_KEY_PATTERN [critical]
    obfuscation: []       # OBFUSCATION [high]
    prompt_injection: []  # PROMPT_INJECTION [critical]
    exfiltration: []      # NET_EXFIL_UNRESTRICTED [high], WEBHOOK_EXFIL [critical]
    trojan: []            # TROJAN_DISTRIBUTION [critical], SUSPICIOUS_PASTE_URL [high], SUSPICIOUS_IP/SOCIAL_ENGINEERING [medium]

  # ── Phase 2 guard analysis: extra patterns for runtime action evaluation ──
  #
  # Two kinds of fields below:
  #   String fields   — plain strings, matched as described per field (case-
  #                     insensitive substring / prefix / domain suffix, etc.).
  #                     No regex metacharacters, no escaping.
  #   Regex fields    — names ending in "_patterns". Each entry is either a
  #                     bare regex string or the "/pattern/flags" form (flags:
  #                     g i m s u y). YAML requires backslashes to be escaped,
  #                     so write "\\d", "\\/", "\\." inside quotes.
  #
  # All fields EXTEND the built-in detection lists; they never replace them.
  # Every match produces a Phase 2 finding at the severity shown in [brackets].
  #
  # Full example:
  #   action_guard_rules:
  #     dangerous_commands: ["format c:", "shutdown -h"]
  #     dangerous_patterns: ["/rm\\s+-rf\\s+\\//"]
  #     webhook_domains:    ["evil-webhook.example.com"]
  #     sensitive_paths:    ["/var/secrets/", ".env.prod"]
  action_guard_rules:
    # Dangerous command strings. Case-insensitive substring match against the
    # full command line (command + args joined by spaces). Use this for fixed
    # literal fragments you want to hard-block.                      [critical]
    # Example: ["format c:", "shutdown -h now", ":(){ :|:& };:"]
    dangerous_commands: []

    # Dangerous command regexes. Matched against the full command line. Use
    # when you need alternation, capture groups, anchors, or character classes
    # the substring form can't express.                              [critical]
    # Syntax: "pattern" or "/pattern/flags"
    # Example: ["/rm\\s+-rf\\s+\\//", "/curl\\s+.*\\|\\s*(ba)?sh/i"]
    dangerous_patterns: []

    # Commands that read sensitive data (keys, secrets, env, dotfiles).
    # Case-insensitive substring match against the full command line. Built-in
    # list already covers /etc/passwd, ~/.ssh, ~/.aws, printenv, etc.     [high]
    # Example: ["cat /vault/", "gpg --decrypt"]
    sensitive_commands: []

    # System-modifying command names (user mgmt, services, filesystem admin).
    # Case-insensitive match at the start of the command OR after a space —
    # i.e. word-boundary match on the program name. Include a trailing space
    # for short names to prevent false prefix hits (e.g. "su " not "su").  [high]
    # Example: ["apt-get", "brew install", "launchctl"]
    system_commands: []

    # Network tool command names. Same word-boundary match rule as
    # system_commands. Flags any use of these tools regardless of target. [medium]
    # Example: ["aria2c", "httpie", "wget2"]
    network_commands: []

    # Webhook / exfiltration domains. Matches when the request URL's hostname
    # is exactly the entry OR a subdomain of it ("foo.example.com" is covered
    # by "example.com"). No scheme, no path, no port.                     [high]
    # Example: ["webhook.site", "requestbin.net", "ngrok-free.app"]
    webhook_domains: []

    # Sensitive file path fragments. Matching is substring-based with a        [critical]
    # specific convention: the matcher prepends "/" to each pattern and then
    # tests `normalized_path.includes("/" + pattern) || normalized_path.endsWith(pattern)`.
    # The input path is normalized first: ~/ is expanded to /HOME/, backslashes
    # become forward slashes.
    #
    # Two supported shapes:
    #   • Directory fragment — DO NOT include a leading slash; the matcher
    #     adds one. Use "etc/" (matches "/etc/passwd"), "raw_files/" (matches
    #     "/anywhere/raw_files/x" and "~/raw_files/x" after normalization),
    #     ".ssh/" (matches "/home/user/.ssh/key").
    #     Writing "/etc/" is a common mistake — it becomes "//etc/" internally
    #     and almost never matches.
    #   • Filename suffix — matched via endsWith; absolute/relative both work
    #     (e.g. ".env", "id_rsa", "credentials.json", ".env.prod").
    #
    # Known gap: a bare relative path like "raw_files/foo.txt" (no leading /)
    # does NOT match a "raw_files/" pattern because there's no "/" before it.
    # Use sensitive_path_patterns below with "/^raw_files\\//" for this case.
    #
    # Example: ["var/secrets/", "raw_files/", ".env.prod", "credentials.json"]
    sensitive_paths: []

    # Sensitive path regexes — covers dynamic segments, relative paths, and
    # anything the substring form can't express. Matched against the same
    # normalized path (~/ expanded to /HOME/).                       [critical]
    # Syntax: "pattern" or "/pattern/flags"
    # Examples:
    #   - "/^\\/abc\\/[^/]+\\/def/"      # /abc/<id>/def (dynamic segment)
    #   - "/^raw_files\\//"              # relative "raw_files/..." paths
    #   - "/\\.env\\.[a-z]+$/i"          # .env.prod, .env.staging, ...
    sensitive_path_patterns: []

    # Secret detection regexes for HTTP request bodies (network_request
    # actions). Matched against the body preview. Use for internal token
    # formats the built-in detector doesn't know about.              [high]
    # Syntax: "pattern" or "/pattern/flags"
    # Example: ["/ACME_[A-Z0-9]{32}/", "/internal-token:\\s*[\\w-]+/i"]
    secret_patterns: []

  # LLM analyser settings (Phase 5 semantic analysis using Claude).
  # Requires api_key to be set. Disable with enabled: false.
  llm_analyser:
    # Enable/disable Phase 5 LLM analysis.
    enabled: false
    # Anthropic API key for LLM-based security analysis.
    api_key: ""
    # Model identifier for LLM analysis.
    model: "claude-sonnet-4-20250514"
    # Maximum input token budget sent to the LLM per scan.
    max_input_tokens: 50000

  # External scoring API (Phase 6). Requires endpoint to be set. Disable with enabled: false.
  external_analyser:
    # Enable/disable Phase 6 external scoring.
    enabled: false
    # Scoring API endpoint. Use http://localhost:9090 for the bundled mock scorer.
    endpoint: ""
    api_key: ""
    timeout: 3000

  # Phase 1 allowlist: additional command prefixes treated as safe.
  # Commands matching these prefixes bypass the guard pipeline.
  # Example: ["npm run", "pnpm "]
  allowed_commands: []

  # Phase 1 allowlist behavior when a command matches:
  #   continue — match → hint only, still run Phase 2-6 (default)
  #   exit     — match → allow + exit immediately (fastest, skips all later phases)
  #
  # Default is "continue" so external/LLM policy can't be bypassed by the
  # built-in SAFE_COMMAND_PREFIXES list (ls, grep, git status, ...). Switch
  # to "exit" if you want the fast path and don't mind allowlisted commands
  # skipping Phase 2-6 entirely.
  allowlist_mode: continue

  # Phase 0 tool gate, per platform. Checked before any content analysis.
  # When non-empty, ONLY listed tools are available to the agent on that platform.
  # The `mcp` list is platform-agnostic and applies whenever the incoming tool
  # is an MCP tool. Entries accept either a bare local name (`HassTurnOn` —
  # matches any MCP server) or a server-qualified name (`hass__HassTurnOn` —
  # that server only). Matching is case-insensitive.
  #
  # The `mcp` list also covers indirect MCP invocations embedded in
  # shell commands. Phase 0 unwraps the command (16 layers covering
  # shells, heredocs, evals, encodings, package wrappers, ssh/docker
  # exec, …) and runs detectors (mcporter, curl/wget/HTTPie,
  # language-runtime one-liners, TCP/socket multiplexers, stdio
  # JSON-RPC pipes, package runners, etc.) against every fragment,
  # mapping each hit back to {server, tool} via the endpoint registry.
  # See docs/MCP-DETECTION.md for the full capture model.
  available_tools:
    claude_code: []
    openclaw: []
    hermes: []
    mcp: []
  # Listed tools are unconditionally blocked.
  blocked_tools:
    claude_code: []
    openclaw: []
    hermes: []
    mcp: []

  # Manual additions to the MCP endpoint registry, for SaaS or otherwise
  # non-discoverable servers (Phase 0 auto-discovers from ~/.claude.json,
  # Claude Desktop, ~/.hermes/config.yaml, ~/.openclaw/openclaw.json by
  # default — declare here only what's missing). Every handle indexes the
  # server so indirect detectors can route a curl URL / unix socket /
  # binary name / npx package back to the server name.
  #
  # mcp_endpoints:
  #   hass:
  #     urls:        ['http://localhost:5173/mcp']
  #     sockets:     ['/tmp/mcp-hass.sock']
  #     binaries:    ['mcp-server-hass']
  #     cliPackages: ['@hass/mcp-cli']
  mcp_endpoints: {}

  # Tool → action type mapping, per platform.
  # Tools listed here enter Phase 1-6 deep analysis.
  # Others pass through Phase 0 only (if allowed) and are auto-approved.
  guarded_tools:
    claude_code:
      Bash: exec_command
      Write: write_file
      Edit: write_file
      WebFetch: network_request
      WebSearch: network_request
    openclaw:
      exec: exec_command
      write: write_file
      web_fetch: network_request
      browser: network_request
    hermes:
      terminal: exec_command
      exec: exec_command
      shell: exec_command
      write_file: write_file
      patch: write_file
      read_file: read_file
      fetch: network_request
      http_request: network_request

  # Phase scoring weights for weighted score aggregation.
  #   final_score = Σ(wi × si) / Σ(wi)  (only phases that ran)
  scoring_weights:
    runtime: 1.0       # Phase 2: pattern matching
    static: 1.0        # Phase 3: static rules on file content
    behavioural: 2.0   # Phase 4: AST dataflow analysis
    llm: 1.0           # Phase 5: LLM semantic analysis
    external: 2.0      # Phase 6: external scoring API

# Telemetry collection — shared OTLP connection + per-signal settings.
# OTLP export is disabled by default (empty endpoint). Set endpoint to enable;
# per-signal `enabled` flags then gate which signals get exported. Local JSONL
# files keep working regardless of endpoint — they're controlled by the
# per-signal `local` flag.
collector:
  # OTLP collector base URL. /v1/traces, /v1/metrics, /v1/logs are appended
  # automatically. Leave empty to disable OTLP export entirely.
  # Example: "http://localhost:4318"
  endpoint: ""
  # Bearer token for OTLP endpoint authentication.
  api_key: ""
  # OTLP export timeout in milliseconds.
  timeout: 5000
  # OTLP transport protocol: http | grpc
  #   http — HTTP/JSON on port 4318
  #   grpc — gRPC on port 4317
  protocol: http

  # Metrics signal (counters, histograms). Exported via OTLP only — there
  # is no local metrics file. Hook event audit records live in the audit
  # log (see `logs` block below).
  metrics:
    enabled: true

  # Traces signal (spans for tool calls, turns, tasks).
  traces:
    enabled: true

  # Logs signal (audit log entries: guard, scan, lifecycle events).
  logs:
    # Enable OTEL Logs export to collector endpoint.
    enabled: true
    # Enable local JSONL backup at the path below.
    local: true
    # Path to local JSONL audit log. Supports ~/ prefix.
    path: "~/.nio/audit.jsonl"
    # Maximum local file size in MB before rotation (0 = no rotation).
    max_size_mb: 100
