      <stop offset="0" stop-color="#303779"/>
      <stop offset="1" stop-color="#2b34ff"/>
    </linearGradient>
    <linearGradient id="nio-grad-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b34ff"/>
      <stop offset="1" stop-color="#8a94ff"/>
    </linearGradient>
  </defs>
  <style>
    .wm { fill: url(#nio-grad-light); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-weight: 800; font-size: 120px; letter-spacing: -4px; }
    @media (prefers-color-scheme: dark) {
